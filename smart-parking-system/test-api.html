<!DOCTYPE html>
<html>
<head>
<title>Test API</title>
<style>
body { font-family: Arial; padding: 20px; }
.result { margin: 20px 0; padding: 15px; border-radius: 5px; }
.success { background: #d4edda; color: #155724; }
.error { background: #f8d7da; color: #721c24; }
button { padding: 10px 20px; margin: 5px; cursor: pointer; }
</style>
</head>
<body>

<h1>API Test Page</h1>

<h2>Test Registration API</h2>
<button onclick="testRegister()">Test Register</button>

<h2>Test Login API</h2>
<button onclick="testLogin()">Test Login</button>

<div id="result"></div>

<script>
async function testRegister() {
    const resultDiv = document.getElementById('result');
    resultDiv.innerHTML = 'Testing registration...';
    
    try {
        const response = await fetch('api/auth.php?action=register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                fullname: 'Test User',
                email: 'test@test.com',
                phone: '1234567890',
                username: 'testuser',
                password: 'test123',
                role: 'user'
            })
        });
        
        const data = await response.json();
        
        resultDiv.className = 'result ' + (data.success ? 'success' : 'error');
        resultDiv.innerHTML = '<strong>Response:</strong><br>' + JSON.stringify(data, null, 2);
        
    } catch (error) {
        resultDiv.className = 'result error';
        resultDiv.innerHTML = '<strong>Error:</strong><br>' + error.message;
    }
}

async function testLogin() {
    const resultDiv = document.getElementById('result');
    resultDiv.innerHTML = 'Testing login...';
    
    try {
        const response = await fetch('api/auth.php?action=login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                username: 'admin',
                password: 'Admin@2026',
                role: 'admin'
            })
        });
        
        const data = await response.json();
        
        resultDiv.className = 'result ' + (data.success ? 'success' : 'error');
        resultDiv.innerHTML = '<strong>Response:</strong><br>' + JSON.stringify(data, null, 2);
        
    } catch (error) {
        resultDiv.className = 'result error';
        resultDiv.innerHTML = '<strong>Error:</strong><br>' + error.message;
    }
}
</script>

</body>
</html>
